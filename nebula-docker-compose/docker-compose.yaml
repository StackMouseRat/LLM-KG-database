    restart: on-failure
    cap_add:
      - SYS_PTRACE

  graphd:
    image: docker.io/vesoft/nebula-graphd:v3.8.0
    environment:
      USER: root
      TZ:   "${TZ}"
    command:
      - --meta_server_addrs=metad0:9559,metad1:9559,metad2:9559
      - --port=9669
      - --local_ip=graphd
      - --ws_ip=graphd
      - --ws_http_port=19669
      - --log_dir=/logs
      - --v=0
      - --minloglevel=0
    depends_on:
      - storaged0
      - storaged1
      - storaged2
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://graphd:19669/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    ports:
      - "9669:9669"
      - 19669
      - 19670
    volumes:
      - ./logs/graph:/logs
    networks:
      - nebula-net
    restart: on-failure
    cap_add:
      - SYS_PTRACE

  graphd1:
    image: docker.io/vesoft/nebula-graphd:v3.8.0
    environment:
      USER: root
      TZ:   "${TZ}"
    command:
      - --meta_server_addrs=metad0:9559,metad1:9559,metad2:9559
      - --port=9669
      - --local_ip=graphd1
      - --ws_ip=graphd1
      - --ws_http_port=19669
      - --log_dir=/logs
      - --v=0
      - --minloglevel=0
    depends_on:
      - storaged0
      - storaged1
      - storaged2
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://graphd1:19669/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    ports:
      - 9669
      - 19669
      - 19670
    volumes:
      - ./logs/graph1:/logs
    networks:
      - nebula-net
    restart: on-failure
    cap_add:
      - SYS_PTRACE

  graphd2:
    image: docker.io/vesoft/nebula-graphd:v3.8.0
    environment:
      USER: root
      TZ:   "${TZ}"
    command:
      - --meta_server_addrs=metad0:9559,metad1:9559,metad2:9559
      - --port=9669
      - --local_ip=graphd2
      - --ws_ip=graphd2
      - --ws_http_port=19669
      - --log_dir=/logs
      - --v=0
      - --minloglevel=0
    depends_on:
      - storaged0
      - storaged1
      - storaged2
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://graphd2:19669/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    ports:
      - 9669
      - 19669
      - 19670
    volumes:
      - ./logs/graph2:/logs
    networks:
      - nebula-net
    restart: on-failure
    cap_add:
      - SYS_PTRACE
  
  console:
    image: docker.io/vesoft/nebula-console:v3.6.0
    entrypoint: ""
    command: 
      - sh
      - -c
      - |
        for i in `seq 1 60`;do
          var=`nebula-console -addr graphd -port 9669 -u root -p nebula -e 'ADD HOSTS "storaged0":9779,"storaged1":9779,"storaged2":9779'`;
          if [[ $$? == 0 ]];then
            break;
          fi;
          sleep 1;
          echo "retry to add hosts.";
        done && tail -f /dev/null;

    depends_on:
      - graphd
    networks:
      - nebula-net

  frontend-proxy:
    build:
      context: ..
      dockerfile: docker/frontend-proxy/Dockerfile
    environment:
      TZ: "${TZ}"
      FRONTEND_PROXY_PORT: "8788"
      LLM_KG_REPO_ROOT: /app
      PIPELINE_SCRIPT: /app/scripts/run_parallel_generation_pipeline.py
      PIPELINE_RUN_DIR: /app/data/frontend_pipeline_runs
      PIPELINE_DEFAULT_OUTPUT_DIR: /app/data/frontend_pipeline_runs
      PIPELINE_BASE_URL: "${PIPELINE_BASE_URL:-http://host.docker.internal:3000/api/v1/chat/completions}"
      PIPELINE_BASIC_KEY_FILE: /run/fastgpt_keys/basic_info_api_key
      PIPELINE_SPLITTER_KEY_FILE: /run/fastgpt_keys/template_publish_test_api_key
      PIPELINE_PARALLEL_KEY_FILE: /run/fastgpt_keys/parallel_gen_api_key
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../docs/project_changes/frontend_pipeline_runs:/app/data/frontend_pipeline_runs
      - ${FASTGPT_KEYS_DIR:-/home/ubuntu/.fastgpt_keys}:/run/fastgpt_keys:ro
    ports:
      - "8788:8788"
    networks:
      - nebula-net
    restart: on-failure

  frontend-ui:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/node:22-bookworm-slim
    working_dir: /app/frontend
    command:
      - sh
      - -lc
      - if [ ! -x node_modules/.bin/vite ]; then npm ci; fi && npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - frontend-proxy
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_DEV_PROXY_TARGET: "http://frontend-proxy:8788"
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    networks:
      - nebula-net
    restart: on-failure

networks:
  nebula-net:

volumes:
  frontend_node_modules:
